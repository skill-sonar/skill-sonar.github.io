# GitHub Pages 自动构建部署
# 参考: https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site
#
# 首次使用请到仓库 Settings → Pages → Build and deployment → Source 选择 "GitHub Actions"
# 若主分支是 master 而非 main，请将下方 branches 改为 ['master']

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']   # 推送到 main 时触发，若主分支是 master 请改为 master
  workflow_dispatch:     # 允许在 Actions 页面手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # 用户站点 (yourname.github.io) 用 /，项目站点用 /仓库名/
          GITHUB_PAGES_BASE: ${{ github.event.repository.name == format('{0}.github.io', github.event.repository.owner) && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Add 404 for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
